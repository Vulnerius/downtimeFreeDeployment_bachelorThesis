---
name: Compile LaTeX
on:
  push:
    branches: 
    - main
  workflow_dispatch: 

jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      - name: GitHub Action with TeXLive
        uses: xu-cheng/latex-action@v4
        with:
          root_file: ba_2026_54584.tex
          latexmk_use_lualatex: true
          run: "-pdf -lualatex -interaction=nonstopmode -halt-on-error"
          
      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: Bachelorarbeit-PDF
          path: main.pdf
