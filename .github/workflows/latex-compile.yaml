---
name: Compile LaTeX
on:
  push:
    branches: 
    - main
  workflow_dispatch: 

jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v6.0.2

      - name: GitHub Action with TeXLive
        uses: xu-cheng/latex-action@v4
        with:
          root_file: ba_2026_54584.tex
          latexmk_use_lualatex: true
          args: "-pdf -lualatex -interaction=nonstopmode -halt-on-error"
          
      - name: Upload PDF
        uses: actions/upload-artifact@v3.2.2
        with:
          name: Bachelorarbeit-PDF
          path: ba_2026_54584.pdf.pdf
